<p><span class="eyebrow">CLAUDE CODE × ショート動画 / 3時間ハンズオン</span></p>
<h1 id="claude-code%E3%81%A7%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88%E5%8B%95%E7%94%BB%E3%82%92%E3%81%A4%E3%81%8F%E3%82%8B">Claude Codeでショート動画をつくる</h1>
<h2 id="%E5%8F%B0%E6%9C%AC%E3%82%82%E3%83%BB%E7%B4%A0%E6%9D%90%E3%82%82%E3%83%BB%E9%9F%B3%E5%A3%B0%E3%82%82%E3%83%BB%E7%B7%A8%E9%9B%86%E3%82%82ai%E3%81%AB%E9%A0%BC%E3%82%93%E3%81%A7%E5%8B%95%E3%81%8F%E5%8B%95%E7%94%BB%E3%81%AB%E3%81%99%E3%82%8B">台本も・素材も・音声も・編集も、AIに頼んで“動く動画”にする</h2>
<p>by Seiya</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E8%87%AA%E5%B7%B1%E7%B4%B9%E4%BB%8B%E3%83%86%E3%83%B3%E3%83%97%E3%83%AC%E3%83%BB%E8%87%AA%E7%94%B1%E3%81%AB%E6%9B%B8%E3%81%8D%E6%8F%9B%E3%81%88">自己紹介（テンプレ・自由に書き換え）</h2>
<ul>
<li>名前 / ふだんやっている動画制作の仕事</li>
<li>なぜこの会を開いたのか（ひとことで）</li>
<li>今日のスタンス：<strong>「全部わからなくてOK。1本できれば勝ち」</strong></li>
</ul>
<div class="do">
<p>今日は“エンジニアになる会”ではありません。<strong>いつもの「素材集め・編集・書き出し」を、AIに頼んで時短する</strong>会です。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%AE%E3%82%B4%E3%83%BC%E3%83%AB">今日のゴール</h2>
<div class="do">
<p><strong>自分の手で、ショート動画を実際に1本書き出すところまで。</strong><br /><br />
作り方の“3つの型”を、手を動かして体験します。</p>
</div>
<div class="diagram">
  <div class="box"><b>① 静止画ショート</b>AIイラスト＋ナレーション<br /><span class="small">画像を並べて動画に</span></div>
  <div class="arrow">／</div>
  <div class="box"><b>② 素材ショート</b>ストック動画＋ナレーション<br /><span class="small">既存の映像を組み合わせ</span></div>
  <div class="arrow">／</div>
  <div class="box"><b>③ 切り抜きショート</b>長い動画から名場面<br /><span class="small">文字起こし＋字幕</span></div>
</div>
<div class="small">
<p>むずかしい契約や公開設定はしません。まずは「自分のPCで動画ファイルができる」ところがゴール。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%AE%E6%B5%81%E3%82%8C3%E6%99%82%E9%96%93">今日の流れ（3時間）</h2>
<table>
<thead>
<tr>
<th>時間</th>
<th>内容</th>
</tr>
</thead>
<tbody>
<tr>
<td>0:00–0:15</td>
<td>自己紹介・今日の流れ・<strong>完成形デモ</strong></td>
</tr>
<tr>
<td>0:15–0:45</td>
<td>最低限の地図（Claude Codeの言葉と仕組み）</td>
</tr>
<tr>
<td>0:45–1:00</td>
<td>みんなで準備（アプリ・APIキー・素材）</td>
</tr>
<tr>
<td>1:00–1:45</td>
<td>ハンズオン①：<strong>静止画ショート</strong>（AIイラスト＋ナレーション）</td>
</tr>
<tr>
<td>1:45–2:15</td>
<td>ハンズオン②：<strong>素材ショート</strong>（ストック動画＋ナレーション）</td>
</tr>
<tr>
<td>2:15–2:45</td>
<td>ハンズオン③：<strong>切り抜きショート</strong>（長い動画→名場面）</td>
</tr>
<tr>
<td>2:45–3:00</td>
<td>おまけ：<strong>ブラウザ自動化</strong>・まとめ・質問</td>
</tr>
</tbody>
</table>
<div class="warn small">
<p>正直な注意：3時間に全部を“完璧に”は入りません。①を全員でしっかり → ②③は要点デモ＋各自トライ、という構成です。<strong>①で「作れた！」を持ち帰るのが最優先。</strong></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%81%BE%E3%81%9A%E5%AE%8C%E6%88%90%E5%BD%A2%E3%82%92%E8%A6%8B%E3%81%A6%E3%82%82%E3%82%89%E3%81%84%E3%81%BE%E3%81%99%E3%83%87%E3%83%A2">まず完成形を見てもらいます（デモ）</h2>
<div class="do">
<p>これから1〜2分。**「テーマを伝えるだけで、ナレーション付きのショートが書き出される」**ところを先に見せます。</p>
</div>
<ul>
<li>ゴールが見えていると、途中の作業で迷子になりません</li>
<li>「あれを自分で作るのか」という感覚を持って始めましょう</li>
<li>完成した縦型動画（9:16）を、その場で再生します</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">PART 1</span></p>
<h1 id="%E6%9C%80%E4%BD%8E%E9%99%90%E3%81%AE%E5%9C%B0%E5%9B%B3">最低限の地図</h1>
<h3 id="%E3%80%9C%E8%A8%80%E8%91%89%E3%81%AF%E4%BD%BF%E3%81%86%E7%9B%B4%E5%89%8D%E3%81%AB1%E5%80%8B%E3%81%9A%E3%81%A4%E3%80%9C">〜言葉は“使う直前に1個ずつ”〜</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%81%9D%E3%82%82%E3%81%9D%E3%82%82claude-code%E3%81%A3%E3%81%A6%E4%BD%95">そもそもClaude Codeって何？</h2>
<div class="split lg">
<div class="t">
<p><span class="term">LLM</span><span class="gloss">ネットの文章を大量に読んだ“物知りな助手”</span></p>
<p><span class="term">Claude</span><span class="gloss">その助手のひとり（Anthropic社製）</span></p>
<p><span class="term">Claude Code</span><span class="gloss">その助手に“手”を付けたもの</span></p>
<blockquote>
<p>ふつうのAIチャットは「答えを言う」だけ。<strong>Claude Codeは、あなたのPCを実際に操作して、ファイルを作ったり、動画を書き出したりできる。</strong></p>
</blockquote>
</div>
<img src="img/llm.png" alt="たくさんの本に囲まれた物知りな助手のイラスト" />
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%81%AA%E3%81%9C%E5%8B%95%E7%94%BB%E5%88%B6%E4%BD%9C%E3%81%A8%E7%9B%B8%E6%80%A7%E3%81%8C%E3%81%84%E3%81%84">なぜ動画制作と相性がいい？</h2>
<ul>
<li><strong>言葉で頼める</strong>：コードや専門ソフトの操作を覚えなくていい</li>
<li><strong>自分で手を動かす</strong>：素材集め→音声生成→編集→書き出しまで通しでやる</li>
<li><strong>失敗を自分で直す</strong>：エラーが出たら原因を探して直し、もう一度試す</li>
<li><strong>道具につながる</strong>：<span class="term">MCP</span>で画像生成・素材サイト・ブラウザにも接続</li>
</ul>
<div class="do">
<p>要するに「<strong>作れる人の条件</strong>」が、“ソフトを使いこなせる”から“<strong>やりたいことを言葉にできる</strong>”に変わった。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="claude-code%E3%81%AE%E9%A0%AD%E3%81%AE%E4%B8%AD4%E3%81%A4%E3%81%AE%E8%A8%80%E8%91%89">Claude Codeの“頭の中”：4つの言葉</h2>
<div class="diagram">
  <div class="box"><b>Context window</b>いま覚えていられる量<span class="small">＝机の広さ</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>Agentic loop</b>考える→やる→直す<span class="small">＝自分で回す</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>MCP</b>外の道具に挿す<span class="small">＝コネクタ</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>Skills</b>作業手順書<span class="small">＝レシピ集</span></div>
</div>
<div class="small">
<p>この4つだけ押さえれば、今日やることは全部「この組み合わせ」で説明できます。1個ずつ見ていきましょう。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="context-window%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E3%83%BB%E3%82%A6%E3%82%A3%E3%83%B3%E3%83%89%E3%82%A6">Context window（コンテキスト・ウィンドウ）</h2>
<p><span class="term">Context window</span><span class="gloss">AIが“いま同時に覚えていられる”情報の広さ＝作業机の広さ</span></p>
<ul>
<li>会話やファイルを読むほど、机の上がどんどん埋まっていく</li>
<li>机がいっぱいになると、<strong>古い話を忘れたり、ぼんやり</strong>してくる</li>
<li>だから長い作業は、<strong>こまめに区切る／要点を伝え直す</strong>のがコツ</li>
</ul>
<div class="do">
<p>実用のコツ：話が長くなって反応が変だなと思ったら、<strong>新しいセッションで「今やりたいこと」だけ伝え直す</strong>。机を片付ける感覚。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="agentic-loop%E8%87%AA%E5%88%86%E3%81%A7%E5%9B%9E%E3%81%99%E4%BB%95%E7%B5%84%E3%81%BF">Agentic loop（自分で回す仕組み）</h2>
<p><span class="term">Agentic loop</span><span class="gloss">考える→やる→結果を見る→直す、を自分で繰り返す</span></p>
<div class="diagram">
  <div class="box"><b>考える</b><span class="small">何をすべきか</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>やる</b><span class="small">素材生成・書き出し</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>確認</b><span class="small">結果・エラー</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>直す</b><span class="small">必要なら修正</span></div>
</div>
<div class="split sm">
<div class="t">
<ul>
<li>人が一手ずつ指示しなくても、ある程度<strong>自走</strong>する</li>
<li>動画づくりは工程が多い → ここがいちばん効く</li>
<li>だから「<strong>止める・確認する</strong>」操作が大事になる</li>
</ul>
</div>
<img src="img/agentic_loop.png" alt="考える→やる→確認→直すをぐるぐる繰り返すループのイラスト" />
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="mcp%E3%82%B3%E3%83%8D%E3%82%AF%E3%82%BF%E3%81%A8%E3%81%AF">MCP（コネクタ）とは</h2>
<div class="split sm">
<div class="t">
<p><span class="term">MCP</span><span class="gloss">AI用の“USB端子”。外部サービスに挿す仕組み</span></p>
<ul>
<li>Claude Code単体は「自分のPCの中」が基本</li>
<li><strong>MCPを挿す</strong>と、外の世界につながる</li>
<li>今日は<a href="https://elements.envato.com/"><span class="term">Envato</span></a>（素材サイト）や<strong>ブラウザ</strong>をMCPで操作します</li>
</ul>
</div>
<img src="img/mcp.png" alt="USB端子で外部の道具につながるAIのイラスト" />
</div>
<div class="do">
<p>イメージ：<strong>画像生成AI・素材サイト・ブラウザ</strong>を、AIの“手の届く範囲”に挿し込む。挿すだけで、できることが一気に増える。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="skills%E3%82%B9%E3%82%AD%E3%83%AB%E3%81%A8%E3%81%AF">Skills（スキル）とは</h2>
<div class="split sm">
<div class="t">
<p><span class="term">Skills</span><span class="gloss">よく使う“作業手順書”をまとめたパック</span></p>
<ul>
<li>「この手順で動画を作って」を、あらかじめ覚えさせておけるもの</li>
<li>画面で <strong><code>/</code>（スラッシュ）</strong> を打つと呼び出せる</li>
<li>毎回ゼロから説明しなくてよくなる</li>
</ul>
</div>
<img src="img/skills.png" alt="手順書（レシピ集）を持つロボットのイラスト" />
</div>
<div class="do">
<p>今日のハンズオンは、<strong>ショート動画用のSkillsを呼び出す</strong>のが中心。<br /><br />
「①静止画」「②素材」「③切り抜き」それぞれに専用のSkillを用意しています。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="agent--%E3%82%B5%E3%83%96%E3%82%A8%E3%83%BC%E3%82%B8%E3%82%A7%E3%83%B3%E3%83%88%E3%81%8A%E3%81%BE%E3%81%91%E3%81%AE%E8%A8%80%E8%91%89">Agent / サブエージェント（おまけの言葉）</h2>
<p><span class="term">Agent</span><span class="gloss">ひとつの仕事を任せられる“AIの担当者”</span><br />
<span class="term">サブエージェント</span><span class="gloss">本体が、別の担当者に一部を“丸投げ”する仕組み</span></p>
<ul>
<li>大きな作業を、<strong>小さな担当に分けて並行</strong>で進められる</li>
<li>例：「画像を10枚作る担当」「ナレーションを作る担当」を分ける</li>
<li>私たちは<strong>結果を受け取るだけ</strong>。中の細かいやり取りは見なくてOK</li>
</ul>
<div class="small">
<p>※ 今日は「そういう仕組みがある」程度でOK。Skillsの中で自動的に使われることがあります。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="claude-code%E3%81%AE%E5%BE%97%E6%84%8F%E3%83%BB%E8%8B%A6%E6%89%8B">Claude Codeの得意・苦手</h2>
<ul>
<li><strong>得意</strong>：素材集め・音声生成・編集の自動化／決まった手順のくり返し／試作を<strong>速く</strong></li>
<li><strong>得意</strong>：「ちょっと直して」を何度でも（差分を見て採用/却下）</li>
</ul>
<div class="warn">
<p><strong>苦手</strong>：あいまいな丸投げ、細かい“感性の最終調整”、最新すぎる情報、権利関係の自動判断。<br /><br />
→ <strong>具体的に頼む・できた素材は自分の目で確認する</strong>のが大事。特に<strong>著作権／利用規約</strong>は人間が最終チェック。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">PART 2</span></p>
<h1 id="%E3%81%BF%E3%82%93%E3%81%AA%E3%81%A7%E6%BA%96%E5%82%99">みんなで準備</h1>
<h3 id="%E3%80%9C%E9%81%93%E5%85%B7%E3%81%A8%E3%82%AB%E3%82%AEapi%E3%82%AD%E3%83%BC%E3%82%92%E3%81%9D%E3%82%8D%E3%81%88%E3%82%8B%E3%80%9C">〜道具とカギ（APIキー）をそろえる〜</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%AE%E9%81%93%E5%85%B7%E7%AB%8B%E3%81%A6%E5%85%A8%E4%BD%93%E5%83%8F">今日の道具立て（全体像）</h2>
<div class="diagram">
  <div class="box"><b>Claude Code</b>作業の司令塔<span class="small">指示を出す相手</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>Remotion</b>コードで動画を組む<span class="small">編集ソフトの代わり</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>IrodoriTTS</b>ナレーション音声<span class="small">声を作る</span></div>
  <div class="arrow">＋</div>
  <div class="box"><b>素材</b>画像/動画<span class="small">AI生成 or ストック</span></div>
</div>
<div class="small">
<p>これらは<strong>プロジェクトに最初から入っています</strong>。みなさんは「動かすカギ（APIキー）」を入れるだけ。<br /><br />
細かい仕組みは覚えなくてOK。「こういう部品が連携してるんだな」で十分。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%82%AB%E3%82%AEapi%E3%82%AD%E3%83%BC%E3%81%A8%E3%81%AF">カギ（APIキー）とは</h2>
<p><span class="term">APIキー</span><span class="gloss">外部サービスを使うための“合言葉”。サービスごとに発行される文字列</span></p>
<ul>
<li>画像を作るAI、素材サイト、音声…<strong>外の道具を使うには合言葉が要る</strong></li>
<li>もらった合言葉を <strong><code>.env</code>（環境設定ファイル）</strong> に貼り付けておく</li>
<li>一度入れれば、あとはClaudeが自動で使ってくれる</li>
</ul>
<div class="warn">
<p><strong>合言葉＝あなたの財布</strong>。人に見せない・SNSに貼らない・GitHubに上げない。<br /><br />
（<code>.env</code> は最初から「アップロード除外」設定済み）</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%9D%E3%82%8D%E3%81%88%E3%82%8B%E3%82%AB%E3%82%AE%E7%94%A8%E9%80%94%E5%88%A5">今日そろえるカギ（用途別）</h2>
<div class="cols">
<div class="col">
<h3 id="%F0%9F%8E%A8-%E7%94%BB%E5%83%8F%E7%94%9F%E6%88%90"><img class="emoji" draggable="false" alt="🎨" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3a8.svg" data-marp-twemoji=""/> 画像生成</h3>
<p><span class="term">GEMINI_API_KEY</span><br />
<a href="https://ai.google.dev/">Gemini 2.5 Flash Image</a>（通称 <strong>nanobanana</strong>）<br /><br />
<span class="small">①静止画ショートで使用。取得：<a href="https://aistudio.google.com/apikey">aistudio.google.com/apikey</a></span></p>
</div>
<div class="col">
<h3 id="%F0%9F%8E%9E%EF%B8%8F-%E5%8B%95%E7%94%BB%E7%B4%A0%E6%9D%90"><img class="emoji" draggable="false" alt="🎞️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f39e.svg" data-marp-twemoji=""/> 動画素材</h3>
<p><a href="https://www.pexels.com/"><span class="term">Pexels</span></a> / <a href="https://pixabay.com/"><span class="term">Pixabay</span></a><br />
無料のストック動画API<br /><br />
<span class="small">②素材ショートで使用。<a href="https://elements.envato.com/">Envato</a>は有料で高品質</span></p>
</div>
<div class="col">
<h3 id="%F0%9F%97%A3%EF%B8%8F-%E9%9F%B3%E5%A3%B0"><img class="emoji" draggable="false" alt="🗣️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5e3.svg" data-marp-twemoji=""/> 音声</h3>
<p><a href="https://huggingface.co/Aratako/Irodori-TTS-500M-v2"><span class="term">IrodoriTTS</span></a><br />
ローカルで動くナレーション生成<br /><br />
<span class="small">無料・回数制限なし。キー不要、起動するだけ</span></p>
</div>
</div>
<div class="small">
<p>※ 切り抜き（③）では文字起こしに <strong>OpenAIのキー</strong> を使います。後ほど。投稿（YouTube連携）は今日は任意。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="irodoritts%E3%83%8A%E3%83%AC%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E9%9F%B3%E5%A3%B0">IrodoriTTS（ナレーション音声）</h2>
<p><a href="https://huggingface.co/Aratako/Irodori-TTS-500M-v2"><span class="term">IrodoriTTS</span></a><span class="gloss">文章を“しゃべり声”に変える、手元で動く音声エンジン</span></p>
<ul>
<li><strong>無料・回数制限なし</strong>（自分のPCの中で動く）</li>
<li>声の雰囲気を <strong>言葉で指定</strong>できる<br /><span class="small">例：「明るく聞き取りやすい男性の語り口で、好奇心と驚きを込めて」</span></li>
<li><strong>参照音声</strong>を使うと、動画ごとに声がブレない（同じ声で統一）</li>
<li>読み間違いは、台本のひらがなを直せば直る<span class="small">（例：後の世→のちの世）</span></li>
</ul>
<div class="do">
<p>使う前に一度だけ「起動」しておけばOK。あとはClaudeが各セリフを自動で音声化します。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E6%BA%96%E5%82%99%E3%83%81%E3%82%A7%E3%83%83%E3%82%AF%E3%83%AA%E3%82%B9%E3%83%88">準備チェックリスト</h2>
<table>
<thead>
<tr>
<th>やること</th>
<th>今日やる？</th>
</tr>
</thead>
<tbody>
<tr>
<td>Claude Code が動く（プロジェクトを開く）</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 全員</td>
</tr>
<tr>
<td><code>.env</code> に <strong>GEMINI_API_KEY</strong> を貼る</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> ①で使う</td>
</tr>
<tr>
<td>Pexels/Pixabay のキー（任意・無料）</td>
<td>◯ ②で使う</td>
</tr>
<tr>
<td>IrodoriTTS を起動</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> ①②で使う</td>
</tr>
<tr>
<td>OpenAI キー</td>
<td>◯ ③切り抜きで使う</td>
</tr>
<tr>
<td>YouTube連携（OAuth）</td>
<td>△ 投稿したい人だけ</td>
</tr>
</tbody>
</table>
<div class="small">
<p>詰まっても大丈夫。**カギが1つ入れば①は動きます。**まず①を全員で完走しましょう。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">共通の地図</span></p>
<h1 id="%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88%E5%8B%95%E7%94%BB%E3%81%8C%E3%81%A7%E3%81%8D%E3%82%8B%E3%81%BE%E3%81%A7">ショート動画が“できるまで”</h1>
<h3 id="%E3%80%9C%E3%81%A9%E3%81%AE%E4%BD%9C%E3%82%8A%E6%96%B9%E3%82%82%E6%B5%81%E3%82%8C%E3%81%AF%E5%90%8C%E3%81%98%E3%80%9C">〜どの作り方も、流れは同じ〜</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="4%E5%B7%A5%E7%A8%8B%E3%81%AF%E3%81%A9%E3%81%AE%E5%9E%8B%E3%81%A7%E3%82%82%E5%90%8C%E3%81%98">4工程はどの型でも同じ</h2>
<div class="diagram">
  <div class="box"><b>①台本</b>何を話すか<span class="small">構成・ナレーション文</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>②素材</b>絵・映像<span class="small">AI生成 / ストック / 元動画</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>③音声</b>ナレーション<span class="small">IrodoriTTS</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>④合成</b>1本の動画に<span class="small">Remotion / ffmpeg</span></div>
</div>
<div class="do">
<p>3つの“型”の違いは、<strong>②素材をどこから持ってくるか</strong>だけ。<br /><br />
①AIで描く ／ ②ストックから借りる ／ ③長い動画から切り出す。台本・音声・合成は共通。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="remotion%E3%83%AA%E3%83%A2%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%A8%E3%81%AF">Remotion（リモーション）とは</h2>
<p><a href="https://www.remotion.dev/"><span class="term">Remotion</span></a><span class="gloss">“コードで動画を組み立てる”仕組み。編集ソフトの代わり</span></p>
<ul>
<li>タイムラインを手で並べる代わりに、<strong>設定（テキスト）から動画を生成</strong></li>
<li>同じ型で<strong>量産</strong>できる・<strong>やり直しが一瞬</strong>（数字を変えて作り直すだけ）</li>
<li>字幕・アイコン・ズーム・テロップが<strong>自動でそろう</strong></li>
</ul>
<div class="do">
<p>みなさんがRemotionのコードを書くことはありません。<strong>Claudeが書いて動かします。</strong><br /><br />
「编集ソフトを自動操作してくれる人がいる」くらいの感覚でOK。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%A4%E3%81%8F%E3%82%8B3%E3%81%A4%E3%81%AE%E5%9E%8B">今日つくる“3つの型”</h2>
<div class="cols">
<div class="col">
<h3 id="%E2%91%A0-%E9%9D%99%E6%AD%A2%E7%94%BB%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">① 静止画ショート</h3>
<p>AIイラスト＋ナレーション<br /><br />
<span class="small">Gemini nanobanana で絵を生成</span><br /><br />
<span class="pill">アニメ調・偉人伝・雑学</span></p>
</div>
<div class="col">
<h3 id="%E2%91%A1-%E7%B4%A0%E6%9D%90%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">② 素材ショート</h3>
<p>ストック動画＋ナレーション<br /><br />
<span class="small">Pexels/Pixabay/Envato から映像</span><br /><br />
<span class="pill">解説・TOP5・ニュース</span></p>
</div>
<div class="col">
<h3 id="%E2%91%A2-%E5%88%87%E3%82%8A%E6%8A%9C%E3%81%8D%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">③ 切り抜きショート</h3>
<p>長い動画から名場面<br /><br />
<span class="small">文字起こし→いいとこ抽出→字幕</span><br /><br />
<span class="pill">対談・講義・Q&amp;A</span></p>
</div>
</div>
<br />
<blockquote>
<p>どれも「<strong>Skillを呼ぶ → 構成を確認 → 生成 → 自分の目でチェック</strong>」という同じリズム。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">HANDS-ON 1</span></p>
<h1 id="%E9%9D%99%E6%AD%A2%E7%94%BB%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">静止画ショート</h1>
<h3 id="ai%E3%82%A4%E3%83%A9%E3%82%B9%E3%83%88%EF%BC%8B%E3%83%8A%E3%83%AC%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%A71%E6%9C%AC">AIイラスト＋ナレーションで1本</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A0%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF">①の仕組み</h2>
<div class="diagram">
  <div class="box"><b>構成案</b>6コマの台本<span class="small">Claudeが提案</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>画像生成</b>nanobanana<span class="small">1コマ1枚・縦型</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>音声</b>IrodoriTTS<span class="small">コマごとに音声</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>合成</b>字幕＋BGM<span class="small">9:16 の short.mp4</span></div>
</div>
<div class="small">
<p>使うSkill：<span class="term">youtube-shorts</span>（アニメ調・静止画）。「アニメ調で作って」と言うと呼ばれます。<br /><br />
画像1枚あたり数円。6枚で十数円ほど。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A0%E3%81%AE%E9%80%B2%E3%82%81%E6%96%B9%E5%AE%9F%E6%BC%94%E3%81%97%E3%81%AA%E3%81%8C%E3%82%89">①の進め方（実演しながら）</h2>
<ol>
<li>Claudeに<strong>テーマを伝える</strong>（型は「アニメ調・静止画で」）</li>
<li>Claudeが**構成案（コマ＋ナレーション）**を出す → ここで直す</li>
<li>「OK」と言うと、<strong>画像→音声→合成</strong>まで自動で進む</li>
<li>出てきた <strong><code>short.mp4</code>（縦型）を自分の目で確認</strong></li>
<li>直したいコマだけ「3番の絵をこう変えて」と頼む</li>
</ol>
<div class="do">
<p>頼み方の例（コピペOK）：<br /><br />
「<strong>アニメ調の静止画ショート</strong>を作りたい。テーマは『スティーブ・ジョブズが風呂に入らなかった話』。まず6コマの構成とナレーションを提案して。」</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A0%E3%81%AE%E3%83%81%E3%82%A7%E3%83%83%E3%82%AF%E3%81%A8%E7%9B%B4%E3%81%97%E6%96%B9">①のチェックと直し方</h2>
<ul>
<li><strong>構成の段階で直すのが一番ラク</strong>（絵を作る前に台本を固める）</li>
<li>絵が気に入らない → 「3番だけ作り直して。もっと夜の雰囲気で」</li>
<li>声が硬い → 「ナレーションをもっと明るい語り口に」</li>
<li>読み間違い → 台本のその語を<strong>ひらがな</strong>に直す</li>
</ul>
<div class="warn small">
<p>注意：実在の人物・ブランドのAI画像は**“そっくり”を避け、雰囲気で**。投稿時は各プラットフォームのルールも確認。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A0%E3%81%AE%E5%AE%9F%E4%BE%8B%E3%82%AF%E3%83%AA%E3%83%83%E3%82%AF%E3%81%A7%E5%86%8D%E7%94%9F">①の実例（クリックで再生）</h2>

<p><span class="eyebrow">HANDS-ON 2</span></p>
<h1 id="%E7%B4%A0%E6%9D%90%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">素材ショート</h1>
<h3 id="%E3%82%B9%E3%83%88%E3%83%83%E3%82%AF%E5%8B%95%E7%94%BB%EF%BC%8B%E3%83%8A%E3%83%AC%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%A71%E6%9C%AC">ストック動画＋ナレーションで1本</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A1%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF">②の仕組み</h2>
<div class="diagram">
  <div class="box"><b>構成案</b>シーン/順位<span class="small">解説 or TOP5</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>素材取得</b>Pexels等<span class="small">英語キーワードで検索</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>音声</b>IrodoriTTS<span class="small">シーンごと</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>合成</b>Remotion<span class="small">字幕・アイコン・テロップ</span></div>
</div>
<div class="small">
<p>使うSkill：<span class="term">stock-video-shorts</span>（このリポジトリの<strong>おすすめ既定</strong>）。2つの型：<br /><br />
<b>concept-explainer</b>（1テーマ解説）と <b>remotion-toplist</b>（TOP5ランキング）。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A1%E3%81%AE%E9%80%B2%E3%82%81%E6%96%B9%E5%AE%9F%E6%BC%94%E3%81%97%E3%81%AA%E3%81%8C%E3%82%89">②の進め方（実演しながら）</h2>
<ol>
<li>Claudeに<strong>テーマ＋型</strong>を伝える（解説 or TOP5）</li>
<li>Claudeが<strong>シーン構成・ナレーション・検索キーワード</strong>を提案</li>
<li>「OK」→ <strong>ストック動画を自動取得→音声→Remotionで合成</strong></li>
<li>出てきた <strong>縦型 <code>short.mp4</code> を確認</strong></li>
<li>「3位の映像が地味」→ 検索キーワードを変えて差し替え</li>
</ol>
<div class="do">
<p>頼み方の例（コピペOK）：<br /><br />
「<strong>ストック動画で TOP5 ショート</strong>を作って。テーマは『世界一大きい動物 TOP5』。まず構成案（各順位の名前・数値・ナレーション・映像の検索ワード）を出して。」</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A1%E3%81%AE%E5%BC%B7%E3%81%BF%E8%91%97%E4%BD%9C%E6%A8%A9%E3%81%A8%E9%87%8F%E7%94%A3">②の強み：著作権と量産</h2>
<ul>
<li>素材は<strong>正規のストックサービス</strong>から取得 → 商用利用の見通しが立てやすい</li>
<li>コストが<strong>ほぼ定額</strong>（無料API or 月額）→ 本数を増やしても安い</li>
<li>同じ型で<strong>横展開しやすい</strong>（TOP5を別テーマで量産）</li>
</ul>
<div class="warn">
<p>ただし<strong>ライセンスは型ごと・素材ごと</strong>に違う。<a href="https://www.pexels.com/">Pexels</a>/<a href="https://pixabay.com/">Pixabay</a>は寛容だが、<strong>最終確認は人間</strong>。<br /><br />
特に<strong>収益化・商用</strong>で使うなら、各サービスの利用規約をその都度チェック。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A1%E3%81%AE%E5%AE%9F%E4%BE%8B%E3%82%AF%E3%83%AA%E3%83%83%E3%82%AF%E3%81%A7%E5%86%8D%E7%94%9F">②の実例（クリックで再生）</h2>
<div class="gallery">
  <a href="https://youtube.com/shorts/Xzgp2CSDewI">
    <img src="https://img.youtube.com/vi/Xzgp2CSDewI/hqdefault.jpg" alt="外国人が驚く日本の技術 TOP5" />
    <span class="cap">外国人が驚く日本の技術 TOP5</span>
    <span class="views">▶ 6,657 回</span>
  </a>
  <a href="https://youtube.com/shorts/p8Scy0yxVX8">

<p><span class="eyebrow">HANDS-ON 3</span></p>
<h1 id="%E5%88%87%E3%82%8A%E6%8A%9C%E3%81%8D%E3%82%B7%E3%83%A7%E3%83%BC%E3%83%88">切り抜きショート</h1>
<h3 id="%E9%95%B7%E3%81%84%E5%8B%95%E7%94%BB%E3%81%8B%E3%82%89%E5%90%8D%E5%A0%B4%E9%9D%A2%E3%82%92%E7%B8%A6%E5%9E%8B%E3%81%AB">長い動画から“名場面”を縦型に</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A2%E3%81%AE%E4%BB%95%E7%B5%84%E3%81%BF%E3%81%93%E3%81%93%E3%81%8C%E9%9D%A2%E7%99%BD%E3%81%84">③の仕組み（ここが面白い）</h2>
<div class="diagram">
  <div class="box"><b>元動画</b>長尺をDL<span class="small">YouTube URL等</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>文字起こし</b><a href="https://github.com/openai/whisper">Whisper</a><span class="small">秒単位の字幕データ</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>★名場面選び</b>Claude本人<span class="small">40〜60秒を選ぶ</span></div>
  <div class="arrow">→</div>
  <div class="box"><b>合成</b>顔寄せ＋字幕<span class="small">9:16の short.mp4</span></div>
</div>
<div class="do">
<p>ポイント：<strong>“バズりスコア”のような自動採点ではない。</strong><br /><br />
Claudeが文字起こしを読んで、「最初の2秒でフックがある／話が完結している」という基準で<strong>理由を説明しながら</strong>選ぶ。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A2%E3%81%AE%E9%80%B2%E3%82%81%E6%96%B9%E5%AE%9F%E6%BC%94%E3%81%97%E3%81%AA%E3%81%8C%E3%82%89">③の進め方（実演しながら）</h2>
<ol>
<li><strong>元動画のURL</strong>をClaudeに渡す（対談・講義・Q&amp;Aが向く）</li>
<li>Claudeが<strong>文字起こし</strong>して、**切り抜き候補（40〜60秒）**を提案<br /><span class="small">「ここが効く理由」も一緒に説明してくれる</span></li>
<li>採用するものを選ぶ → <strong>縦型・顔寄せ・字幕入り</strong>で書き出し</li>
<li><strong><code>short.mp4</code> を確認</strong>してから公開判断</li>
</ol>
<div class="do">
<p>頼み方の例（コピペOK）：<br /><br />
「この動画 <code><a href="https://youtu.be/%E2%80%A6">https://youtu.be/…</a></code> から、<strong>40〜60秒の切り抜きショート</strong>を3本作りたい。文字起こしして、<strong>フックの強い場面</strong>を理由つきで提案して。」</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A2%E3%81%AE%E3%81%86%E3%82%8C%E3%81%97%E3%81%84%E8%87%AA%E5%8B%95%E5%87%A6%E7%90%86">③のうれしい自動処理</h2>
<ul>
<li><strong>カラオケ字幕</strong>：今しゃべっている言葉が黄色くハイライト</li>
<li><strong>顔追従＋ズーム</strong>：話者の顔を中央に寄せて縦型にトリミング</li>
<li><strong>間（ま）のカット</strong>：無音や「えーと・あの」を自動で詰められる</li>
<li><strong>結論先出し</strong>：オチを冒頭に持ってくる構成も指定できる</li>
</ul>
<div class="warn small">
<p>権利の大前提：<strong>他人の動画を切り抜くには許諾が必要</strong>。自分の動画、または許可・契約のある素材で。<br /><br />
出力は最初<strong>非公開</strong>で書き出し → 確認してから公開、が安全。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E2%91%A2%E3%81%AE%E5%AE%9F%E4%BE%8B%E3%82%AF%E3%83%AA%E3%83%83%E3%82%AF%E3%81%A7%E5%86%8D%E7%94%9F">③の実例（クリックで再生）</h2>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">BONUS</span></p>
<h1 id="%E3%83%96%E3%83%A9%E3%82%A6%E3%82%B6%E8%87%AA%E5%8B%95%E5%8C%96">ブラウザ自動化</h1>
<h3 id="ai%E3%81%AB%E3%83%96%E3%83%A9%E3%82%A6%E3%82%B6%E3%82%92%E6%93%8D%E4%BD%9C%E3%81%97%E3%81%A6%E3%82%82%E3%82%89%E3%81%86">AIに“ブラウザを操作”してもらう</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%83%96%E3%83%A9%E3%82%A6%E3%82%B6%E8%87%AA%E5%8B%95%E5%8C%96%E3%81%A8%E3%81%AF">ブラウザ自動化とは</h2>
<div class="split sm">
<div class="t">
<p><span class="term">Agent browser</span><span class="gloss">AIが人の代わりにブラウザを開いて操作する仕組み</span></p>
<ul>
<li>画面を見て<strong>クリック・入力・スクロール・スクショ</strong>ができる</li>
<li>Claude Codeに<strong>ブラウザの“手”を足す</strong>イメージ（MCPの一種）</li>
<li>動画制作の前後の<strong>面倒な手作業</strong>を任せられる</li>
</ul>
</div>
<img src="img/mcp.png" alt="ブラウザを自動操作するAIのイラスト" />
</div>
<div class="small">
<p>代表例：Claude in Chrome（拡張）や Playwright MCP。「このサイトを開いて〜して」と頼むだけ。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E5%8B%95%E7%94%BB%E5%88%B6%E4%BD%9C%E3%81%A7%E3%81%AE%E4%BD%BF%E3%81%84%E9%81%93">動画制作での使い道</h2>
<div class="cols">
<div class="col">
<h3 id="%F0%9F%94%8E-%E3%83%8D%E3%82%BF%E3%83%BB%E3%83%88%E3%83%AC%E3%83%B3%E3%83%89%E9%9B%86%E3%82%81"><img class="emoji" draggable="false" alt="🔎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f50e.svg" data-marp-twemoji=""/> ネタ・トレンド集め</h3>
<p>急上昇やコメントを<strong>一覧化</strong><br /><br />
<span class="small">「このページの上位10件を表に」</span></p>
</div>
<div class="col">
<h3 id="%F0%9F%96%BC%EF%B8%8F-%E7%B4%A0%E6%9D%90%E3%81%95%E3%81%8C%E3%81%97"><img class="emoji" draggable="false" alt="🖼️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5bc.svg" data-marp-twemoji=""/> 素材さがし</h3>
<p>素材サイトを横断して<strong>候補を収集</strong><br /><br />
<span class="small">「条件に合う動画を10本リスト」</span></p>
</div>
<div class="col">
<h3 id="%E2%AC%86%EF%B8%8F-%E6%8A%95%E7%A8%BF%E3%81%BE%E3%82%8F%E3%82%8A%E3%81%AE%E4%B8%8B%E3%81%94%E3%81%97%E3%82%89%E3%81%88"><img class="emoji" draggable="false" alt="⬆️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b06.svg" data-marp-twemoji=""/> 投稿まわりの下ごしらえ</h3>
<p>タイトル・説明文の<strong>下書き入力</strong><br /><br />
<span class="small">最終送信は人がチェック</span></p>
</div>
</div>
<br />
<div class="warn small">
<p>マナー：<strong>少量・学習目的</strong>で。相手サイトの規約・回数制限に配慮（大量取得しない）。自動“送信・投稿”は事故のもと → <strong>下書きまで＝人が最後に確認</strong>が安全。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-class="section" data-theme="default" lang="en-US" class="section" style="--class:section;--theme:default;" data-size="16:9">
<p><span class="eyebrow">WRAP-UP</span></p>
<h1 id="%E3%81%BE%E3%81%A8%E3%82%81">まとめ</h1>
<h3 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%81%A3%E3%81%A6%E3%81%BB%E3%81%97%E3%81%84%E3%81%93%E3%81%A8">持ち帰ってほしいこと</h3>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E4%BB%8A%E6%97%A5%E3%81%AE3%E3%81%A4%E3%81%AE%E5%9E%8B%E3%83%BB%E3%81%8A%E3%81%95%E3%82%89%E3%81%84">今日の3つの型・おさらい</h2>
<table>
<thead>
<tr>
<th>型</th>
<th>素材のもと</th>
<th>呼ぶSkill</th>
<th>向いてる内容</th>
</tr>
</thead>
<tbody>
<tr>
<td>① 静止画</td>
<td>AIイラスト(nanobanana)</td>
<td><code>youtube-shorts</code></td>
<td>アニメ調・偉人伝・雑学</td>
</tr>
<tr>
<td>② 素材</td>
<td>ストック動画(Pexels等)</td>
<td><code>stock-video-shorts</code></td>
<td>解説・TOP5・ニュース</td>
</tr>
<tr>
<td>③ 切り抜き</td>
<td>長い元動画</td>
<td><code>youtube-clipper</code></td>
<td>対談・講義・Q&amp;A</td>
</tr>
</tbody>
</table>
<div class="do">
<p>共通のリズムは一つ：<strong>Skillを呼ぶ → 構成を確認 → 生成 → 自分の目でチェック → （必要なら）投稿。</strong></p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E3%81%84%E3%81%A1%E3%81%B0%E3%82%93%E5%A4%A7%E4%BA%8B%E3%81%AA%E6%84%9F%E8%A6%9A">いちばん大事な感覚</h2>
<ul>
<li><strong>コマンドを覚える会ではない</strong>。「やりたいことを言葉にする」会</li>
<li>AIは<strong>自走する</strong>。だから「<strong>止める・確認する</strong>」がこちらの仕事</li>
<li><strong>できた素材は必ず自分の目で</strong>。特に<strong>著作権・利用規約は人間が最終チェック</strong></li>
<li>完璧を狙わない。<strong>まず1本出して、回しながら良くする</strong></li>
</ul>
<div class="do">
<p>「全部わからなくてOK。<strong>1本できれば勝ち。</strong>」</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="default" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:default;" data-marpit-pagination-total="48" data-size="16:9">
<h2 id="%E6%8C%81%E3%81%A1%E5%B8%B0%E3%82%8A%E3%83%BB%E6%AC%A1%E3%81%AE%E4%B8%80%E6%AD%A9">持ち帰り・次の一歩</h2>
<ul>
<li>今日作った1本を、<strong>自分のチャンネルのテーマ</strong>で作り直してみる</li>
<li>うまくいった<strong>頼み方（プロンプト）をメモ</strong>して使い回す</li>
<li>詰まったら**復習用の記事（index.html）**を見返す<span class="small">（このスライドの記事版）</span></li>
</ul>
<div class="do">
<p>質問タイム <img class="emoji" draggable="false" alt="🙋" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f64b.svg" data-marp-twemoji=""/><br /><br />
「自分のチャンネルだとどの型が合う？」も、その場で一緒に考えましょう。</p>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-class="title" data-theme="default" lang="en-US" class="title" style="--class:title;--theme:default;" data-size="16:9">
<p><span class="eyebrow">THANK YOU</span></p>
<h1 id="%E4%BB%8A%E6%97%A5%E3%81%AF%E3%81%8A%E3%81%A4%E3%81%8B%E3%82%8C%E3%81%95%E3%81%BE%E3%81%A7%E3%81%97%E3%81%9F">今日はおつかれさまでした</h1>
<h2 id="%E3%81%82%E3%81%A8%E3%81%AF%E6%89%8B%E3%82%92%E5%8B%95%E3%81%8B%E3%81%97%E3%81%9F%E5%88%86%E3%81%A0%E3%81%91%E6%85%A3%E3%82%8C%E3%81%A6%E3%81%84%E3%81%8D%E3%81%BE%E3%81%99">あとは、手を動かした分だけ慣れていきます</h2>
<p><span class="small">復習はワークブック（docs/index.html）へ</span></p>
